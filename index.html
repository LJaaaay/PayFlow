<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayFlow · Payables Dashboard</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #13131f; color: #e2e8f0; font-family: Inter, sans-serif; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #13131f; }
    ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip,
  ResponsiveContainer, PieChart, Pie, Cell, Legend
} = Recharts;
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIG ───────────────────────────────────────────────────────────
const WEBHOOK_URL = "https://n8n-n8n.9oqaim.easypanel.host/webhook/dashboard-data";

const COLORS = ["#6366f1","#22d3ee","#f59e0b","#10b981","#ef4444","#a78bfa","#fb923c","#34d399"];
const INTERVALS = [
  { label: "30s",  value: 30  },
  { label: "1min", value: 60  },
  { label: "2min", value: 120 },
  { label: "5min", value: 300 },
];

// ── Tooltip style shared across ALL charts ───────────────────────────
// Main label → white, value/items → blue (#60a5fa)
const TOOLTIP_STYLE = {
  contentStyle: {
    background: "#1e1e2e",
    border: "1px solid #333",
    borderRadius: 8,
    color: "#ffffff",
  },
  labelStyle: { color: "#ffffff", fontWeight: 600, marginBottom: 4 },
  itemStyle:  { color: "#60a5fa" },
};

// ── FETCH ────────────────────────────────────────────────────────────
async function fetchDashboardData() {
  const res = await fetch(WEBHOOK_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
  return await res.json();
}

// ── COMPONENTS ───────────────────────────────────────────────────────
const KPI = ({ title, value, sub, color }) => (
  <div style={{ background:"#1e1e2e", border:`1px solid ${color}33`, borderRadius:12, padding:"18px 22px", flex:1, minWidth:150 }}>
    <div style={{ color:"#aaa", fontSize:12, marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>{title}</div>
    <div style={{ color, fontSize:28, fontWeight:700 }}>{value}</div>
    {sub && <div style={{ color:"#666", fontSize:12, marginTop:4 }}>{sub}</div>}
  </div>
);

const SectionTitle = ({ children }) => (
  <h2 style={{ color:"#e2e8f0", fontSize:16, fontWeight:600, margin:"28px 0 14px", borderLeft:"3px solid #6366f1", paddingLeft:10 }}>{children}</h2>
);

const CustomMatchBar = ({ name, pct, matched, total }) => {
  const color = pct >= 80 ? "#10b981" : pct >= 50 ? "#f59e0b" : "#ef4444";
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, color:"#ccc", marginBottom:4 }}>
        <span>{name}</span>
        <span style={{ color }}>{matched}/{total} ({pct}%)</span>
      </div>
      <div style={{ background:"#2a2a3e", borderRadius:6, height:8, overflow:"hidden" }}>
        <div style={{ width:`${pct}%`, background:color, height:"100%", borderRadius:6, transition:"width 0.6s ease" }} />
      </div>
    </div>
  );
};

const Toast = ({ msg, visible, onClose }) => (
  <div style={{
    position:"fixed", bottom:28, right:28, zIndex:999,
    background:"#1e1e2e", border:"1px solid #6366f1", borderRadius:12,
    padding:"14px 18px", display:"flex", alignItems:"center", gap:12,
    boxShadow:"0 8px 32px #0008", maxWidth:320, pointerEvents: visible ? "all" : "none",
    transform: visible ? "translateY(0)" : "translateY(90px)",
    opacity: visible ? 1 : 0,
    transition:"transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease",
  }}>
    <span style={{ fontSize:20 }}>🆕</span>
    <div style={{ flex:1 }}>
      <div style={{ color:"#6366f1", fontWeight:700, fontSize:13 }}>Nuevos registros</div>
      <div style={{ color:"#888", fontSize:12, marginTop:2 }}>{msg}</div>
    </div>
    <button onClick={onClose} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:16 }}>✕</button>
  </div>
);

const RefreshBar = ({ countdown, interval, paused, onToggle, onIntervalChange, lastUpdated, loading }) => (
  <div style={{ display:"flex", alignItems:"center", gap:12, padding:"7px 0 14px", fontSize:12, color:"#666", flexWrap:"wrap" }}>
    <span style={{ display:"flex", alignItems:"center", gap:6 }}>
      <span style={{
        width:7, height:7, borderRadius:"50%", display:"inline-block",
        background: loading ? "#6366f1" : paused ? "#f59e0b" : "#10b981",
        animation: "pulse 2s ease-in-out infinite",
      }} />
      {loading
        ? <span style={{ color:"#6366f1" }}>Consultando base de datos...</span>
        : paused
          ? <span style={{ color:"#f59e0b" }}>Auto-refresh pausado</span>
          : <span>Próximo refresh en <strong style={{ color:"#e2e8f0" }}>{countdown}s</strong></span>
      }
    </span>
    <div style={{ flex:1, maxWidth:160, height:3, background:"#2a2a3e", borderRadius:2, overflow:"hidden" }}>
      <div style={{ width:`${(countdown/interval)*100}%`, height:"100%", background:"#6366f1", borderRadius:2, transition:"width 1s linear" }} />
    </div>
    <button onClick={onToggle} style={{
      background:"transparent", border:`1px solid ${paused ? "#f59e0b" : "#2a2a3e"}`,
      color: paused ? "#f59e0b" : "#666", borderRadius:6, padding:"3px 10px", fontSize:11, cursor:"pointer",
    }}>{paused ? "▶ Reanudar" : "⏸ Pausar"}</button>
    <span style={{ color:"#444" }}>
      Intervalo:{" "}
      <select value={interval} onChange={e => onIntervalChange(Number(e.target.value))}
        style={{ background:"#1e1e2e", border:"1px solid #2a2a3e", color:"#aaa", borderRadius:5, padding:"2px 6px", fontSize:11, cursor:"pointer" }}>
        {INTERVALS.map(i => <option key={i.value} value={i.value}>{i.label}</option>)}
      </select>
    </span>
    {lastUpdated && <span style={{ marginLeft:"auto", color:"#444" }}>Actualizado: {lastUpdated}</span>}
  </div>
);

const ErrorBanner = ({ msg }) => (
  <div style={{ background:"#2a1a1a", border:"1px solid #ef444466", borderRadius:10, padding:"12px 18px", marginBottom:16, color:"#ef4444", fontSize:13 }}>
    ⚠️ Error cargando datos: <strong>{msg}</strong>
    <br/><span style={{ color:"#666", fontSize:11 }}>Verifica que el workflow de n8n esté activo.</span>
  </div>
);

// Alerta de registros sin contraparte en SF próximos a vencer
const SinContraparteAlert = ({ total, vencidas, vencenHoy, proximos7, proximos30, totalVencido, fmtUSD }) => {
  const hayUrgentes = (vencidas + vencenHoy + proximos7) > 0;
  if (!total) return null;
  return (
    <div style={{
      background: hayUrgentes ? "#1f1510" : "#111827",
      border: `1px solid ${hayUrgentes ? "#f59e0b66" : "#374151"}`,
      borderRadius: 12, padding: "16px 20px", marginBottom: 20,
    }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
        <span style={{ fontSize:18 }}>⚠️</span>
        <div>
          <div style={{ color: hayUrgentes ? "#f59e0b" : "#9ca3af", fontWeight:700, fontSize:14 }}>
            Registros sin contraparte en Salesforce
          </div>
          <div style={{ color:"#6b7280", fontSize:12, marginTop:1 }}>
            {total} registro{total !== 1 ? "s" : ""} en mail no tienen match en SF · {fmtUSD(totalVencido)} en riesgo
          </div>
        </div>
        {/* Badge total */}
        <div style={{
          marginLeft:"auto", background: hayUrgentes ? "#f59e0b22" : "#374151",
          color: hayUrgentes ? "#f59e0b" : "#9ca3af",
          borderRadius: 8, padding:"4px 14px", fontSize:13, fontWeight:700,
        }}>{total} sin SF</div>
      </div>

      {/* Mini KPIs */}
      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        {[
          { label:"🔴 Vencidas",     value: vencidas,   color:"#ef4444" },
          { label:"🟡 Vencen Hoy",   value: vencenHoy,  color:"#f59e0b" },
          { label:"🟠 Próx. 7 días", value: proximos7,  color:"#fb923c" },
          { label:"🟢 8–30 días",    value: proximos30, color:"#10b981" },
        ].map(({ label, value, color }) => (
          <div key={label} style={{
            flex:1, minWidth:110, background:"#1e1e2e", borderRadius:8,
            padding:"10px 14px", border:`1px solid ${color}22`,
          }}>
            <div style={{ color:"#6b7280", fontSize:11, marginBottom:4 }}>{label}</div>
            <div style={{ color: value > 0 ? color : "#374151", fontSize:22, fontWeight:700 }}>{value}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── DASHBOARD ────────────────────────────────────────────────────────
function Dashboard() {
  const [tab, setTab]             = useState("overview");
  const [data, setData]           = useState(null);
  const [loading, setLoading]     = useState(true);
  const [error, setError]         = useState(null);
  const [ivl, setIvl]             = useState(60);
  const [countdown, setCountdown] = useState(60);
  const [paused, setPaused]       = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [toast, setToast]         = useState({ visible:false, msg:"" });
  const prevTotalRef = useRef(0);
  const pausedRef    = useRef(false);

  useEffect(() => { pausedRef.current = paused; }, [paused]);

  const loadData = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const result = await fetchDashboardData();
      setData(result);
      setLastUpdated(new Date().toLocaleTimeString("es-MX"));
      if (prevTotalRef.current > 0 && result.totalReg > prevTotalRef.current) {
        const diff = result.totalReg - prevTotalRef.current;
        setToast({ visible:true, msg:`${diff} nuevo(s) registro(s). Total: ${result.totalReg}` });
        setTimeout(() => setToast(t => ({ ...t, visible:false })), 5000);
      }
      prevTotalRef.current = result.totalReg;
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  useEffect(() => {
    setCountdown(ivl);
    const tick = setInterval(() => {
      if (pausedRef.current) return;
      setCountdown(prev => {
        if (prev <= 1) { loadData(); return ivl; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(tick);
  }, [ivl, loadData]);

  const TABS   = ["overview","vencimientos","conciliación","proveedores"];
  const LABELS = { overview:"Resumen", vencimientos:"Vencimientos", conciliación:"Conciliación", proveedores:"Proveedores" };

  const fmtUSD = v => `$${(v||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const fmtNum = v => (v||0).toLocaleString("en-US",{minimumFractionDigits:2});

  const d = data || {};

  return (
    <div style={{ background:"#13131f", minHeight:"100vh", fontFamily:"Inter,sans-serif", color:"#e2e8f0", padding:24 }}>

      {/* Header */}
      <div style={{ marginBottom:8 }}>
        <h1 style={{ fontSize:22, fontWeight:700, color:"#fff", margin:0 }}>📊 Payables Services — Análisis</h1>
        <p style={{ color:"#666", fontSize:13, margin:"4px 0 0" }}>
          {loading && !data ? "Cargando..." : `${d.totalReg || 0} registros · Hoy: ${new Date().toLocaleDateString("es-MX")}`}
        </p>
      </div>

      <RefreshBar countdown={countdown} interval={ivl} paused={paused} loading={loading}
        onToggle={() => setPaused(p => !p)}
        onIntervalChange={val => { setIvl(val); setCountdown(val); }}
        lastUpdated={lastUpdated} />

      {error && <ErrorBanner msg={error} />}

      {/* Tabs */}
      <div style={{ display:"flex", gap:8, marginBottom:24, borderBottom:"1px solid #2a2a3e", paddingBottom:12 }}>
        {TABS.map(t => (
          <button key={t} onClick={() => setTab(t)} style={{
            background: tab===t ? "#6366f1" : "transparent",
            color: tab===t ? "#fff" : "#888",
            border:"none", borderRadius:8, padding:"7px 16px", cursor:"pointer",
            fontSize:13, fontWeight: tab===t ? 600 : 400, transition:"all 0.2s",
          }}>{LABELS[t]}</button>
        ))}
      </div>

      {/* Loading */}
      {loading && !data && (
        <div style={{ textAlign:"center", padding:60, color:"#555" }}>
          <div style={{ width:36, height:36, border:"3px solid #6366f133", borderTopColor:"#6366f1", borderRadius:"50%", animation:"spin 0.8s linear infinite", margin:"0 auto 16px" }} />
          Conectando con n8n...
        </div>
      )}

      {/* ── RESUMEN ── */}
      {tab==="overview" && data && <>
        <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginBottom:4 }}>
          <KPI title="Total Registros" value={d.totalReg}             sub={`${d.uniqueVendors} proveedores activos`}  color="#6366f1" />
          <KPI title="Total USD"       value={fmtUSD(d.totalUSD)}     sub={`${d.countUSD} facturas`}                  color="#22d3ee" />
          {d.countEUR > 0 &&
            <KPI title="Total EUR"     value={`€${fmtNum(d.totalEUR)}`} sub={`${d.countEUR} facturas`}               color="#f59e0b" />
          }
          <KPI title="Vencidas"        value={d.vencidas||0}          sub={fmtUSD(d.totalOverdue) + " en riesgo"}     color="#ef4444" />
        </div>

        <SectionTitle>Estado de Registros</SectionTitle>
        <div style={{ display:"flex", gap:14, flexWrap:"wrap" }}>
          <KPI title="Matched"    value={d.matched||0}    sub="Conciliados con SF"  color="#10b981" />
          <KPI title="Partial"    value={d.partial||0}    sub="Match parcial"       color="#f59e0b" />
          <KPI title="Pending"    value={d.pending||0}    sub="Sin conciliar"       color="#6366f1" />
          <KPI title="Incomplete" value={d.incomplete||0} sub="Datos insuficientes" color="#ef4444" />
        </div>

        <SectionTitle>Distribución SAP & Términos de Pago</SectionTitle>
        <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
          <div style={{ background:"#1e1e2e", borderRadius:12, padding:20, flex:1, minWidth:280 }}>
            <div style={{ color:"#aaa", fontSize:12, marginBottom:12, textTransform:"uppercase" }}>SAP Status</div>
            {(d.sapData||[]).length > 0
              ? <PieChart width={280} height={220}>
                  <Pie data={d.sapData} cx={140} cy={90} outerRadius={75} dataKey="value">
                    {(d.sapData||[]).map((e,i) => <Cell key={i} fill={e.color} />)}
                  </Pie>
                  <Tooltip
                    contentStyle={TOOLTIP_STYLE.contentStyle}
                    labelStyle={TOOLTIP_STYLE.labelStyle}
                    itemStyle={TOOLTIP_STYLE.itemStyle}
                  />
                  <Legend wrapperStyle={{ color:"#ccc", fontSize:13 }} />
                </PieChart>
              : <div style={{ color:"#555", fontSize:13, paddingTop:60, textAlign:"center" }}>Sin datos SAP</div>
            }
          </div>
          <div style={{ background:"#1e1e2e", borderRadius:12, padding:20, flex:1, minWidth:280 }}>
            <div style={{ color:"#aaa", fontSize:12, marginBottom:12, textTransform:"uppercase" }}>Términos de Pago</div>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={d.paymentTermsData||[]} margin={{ top:0, bottom:0, left:-10, right:10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2a2a3e" />
                <XAxis dataKey="name" tick={{ fill:"#aaa", fontSize:11 }} />
                <YAxis tick={{ fill:"#aaa", fontSize:11 }} />
                <Tooltip
                  contentStyle={TOOLTIP_STYLE.contentStyle}
                  labelStyle={TOOLTIP_STYLE.labelStyle}
                  itemStyle={TOOLTIP_STYLE.itemStyle}
                />
                <Bar dataKey="value" fill="#6366f1" radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </>}

      {/* ── VENCIMIENTOS ── */}
      {tab==="vencimientos" && data && <>
        <div style={{ display:"flex", gap:14, flexWrap:"wrap" }}>
          <KPI title="🔴 Vencidas"        value={d.vencidas||0}   sub={fmtUSD(d.totalOverdue) + " en riesgo"} color="#ef4444" />
          <KPI title="🟡 Vencen Hoy"      value={d.vencenHoy||0}  sub={new Date().toLocaleDateString("es-MX")} color="#f59e0b" />
          <KPI title="🟠 Próximos 7 días" value={d.proximos7||0}  sub="Urgente"                               color="#fb923c" />
          <KPI title="🟢 8–30 días"       value={d.proximos30||0} sub="Tiempo disponible"                     color="#10b981" />
        </div>

        <SectionTitle>Sin Contraparte en Salesforce</SectionTitle>
        <SinContraparteAlert
          total={d.scTotal||0} vencidas={d.scVencidas||0} vencenHoy={d.scVencenHoy||0}
          proximos7={d.scProximos7||0} proximos30={d.scProximos30||0}
          totalVencido={d.scTotalVencido||0} fmtUSD={fmtUSD}
        />

        <SectionTitle>Distribución por Fecha de Vencimiento</SectionTitle>

        {/* Centered container with fixed width so the chart doesn't stretch */}
        <div style={{ background:"#1e1e2e", borderRadius:12, padding:20, marginBottom:20, display:"flex", flexDirection:"column", alignItems:"center" }}>
          <PieChart width={420} height={280}>
            <Pie
              data={d.dueDateData||[]}
              cx={210}
              cy={120}
              outerRadius={100}
              dataKey="value"
              /* No label prop → eliminates overlapping text on slices */
            >
              {(d.dueDateData||[]).map((e,i) => <Cell key={i} fill={e.color} />)}
            </Pie>
            <Tooltip
              contentStyle={TOOLTIP_STYLE.contentStyle}
              labelStyle={TOOLTIP_STYLE.labelStyle}
              itemStyle={TOOLTIP_STYLE.itemStyle}
              formatter={(value, name) => [`${value} facturas`, name]}
            />
            {/* Legend below the chart, spaced out */}
            <Legend
              wrapperStyle={{ color:"#aaa", fontSize:13, paddingTop:12 }}
              iconType="circle"
              iconSize={10}
            />
          </PieChart>
        </div>

        <SectionTitle>Facturas Vencidas por Proveedor</SectionTitle>
        <div style={{ background:"#1e1e2e", borderRadius:12, overflow:"hidden" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"#2a2a3e" }}>
                <th style={{ padding:"10px 16px", textAlign:"left",   color:"#aaa", fontWeight:500 }}>Proveedor</th>
                <th style={{ padding:"10px 16px", textAlign:"right",  color:"#aaa", fontWeight:500 }}>Facturas</th>
                <th style={{ padding:"10px 16px", textAlign:"right",  color:"#aaa", fontWeight:500 }}>Monto USD</th>
                <th style={{ padding:"10px 16px", textAlign:"center", color:"#aaa", fontWeight:500 }}>Riesgo</th>
              </tr>
            </thead>
            <tbody>
              {(d.overdueVendors||[]).map((v,i) => (
                <tr key={i} style={{ borderTop:"1px solid #2a2a3e" }}>
                  <td style={{ padding:"10px 16px", color:"#e2e8f0" }}>{v.name}</td>
                  <td style={{ padding:"10px 16px", textAlign:"right", color:"#aaa" }}>{v.count}</td>
                  <td style={{ padding:"10px 16px", textAlign:"right", color:"#ef4444", fontWeight:600 }}>{fmtUSD(v.amount)}</td>
                  <td style={{ padding:"10px 16px", textAlign:"center" }}>
                    <span style={{
                      background: v.amount>1000 ? "#ef444422" : "#f59e0b22",
                      color:      v.amount>1000 ? "#ef4444"   : "#f59e0b",
                      borderRadius:6, padding:"2px 10px", fontSize:11, fontWeight:600,
                    }}>{v.amount>1000 ? "ALTO" : "MEDIO"}</span>
                  </td>
                </tr>
              ))}
              {(d.overdueVendors||[]).length === 0 &&
                <tr><td colSpan={4} style={{ padding:24, textAlign:"center", color:"#555" }}>✅ Sin facturas vencidas</td></tr>
              }
            </tbody>
          </table>
        </div>
      </>}

      {/* ── CONCILIACIÓN ── */}
      {tab==="conciliación" && data && <>
        <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginBottom:20 }}>
          <KPI title="Analizados"  value={(d.matchData||[])[0]?.total || 0} sub="Con match_details"  color="#6366f1" />
          <KPI title="Matched"     value={d.matched||0}    sub="Match perfecto"    color="#10b981" />
          <KPI title="Partial"     value={d.partial||0}    sub="Match parcial"     color="#f59e0b" />
          <KPI title="Sin match"   value={(d.pending||0) + (d.incomplete||0)} sub="Pendientes" color="#ef4444" />
        </div>

        <SectionTitle>Porcentaje de Coincidencia por Campo</SectionTitle>
        <div style={{ background:"#1e1e2e", borderRadius:12, padding:20 }}>
          {(d.matchData||[]).length > 0
            ? (d.matchData||[]).map((m,i) => <CustomMatchBar key={i} {...m} />)
            : <div style={{ color:"#555", textAlign:"center", padding:40 }}>Sin datos de conciliación aún.</div>
          }
        </div>

        <SectionTitle>Campos con Baja Coincidencia (&lt;50%)</SectionTitle>
        <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
          {(d.matchData||[]).filter(m => m.pct < 50).slice(0,3).map((item,i) => (
            <div key={i} style={{ background:"#2a1a1a", border:"1px solid #ef444433", borderRadius:12, padding:"14px 18px", flex:1, minWidth:200 }}>
              <div style={{ color:"#ef4444", fontWeight:600, fontSize:14 }}>{item.name}</div>
              <div style={{ color:"#ef4444", fontSize:24, fontWeight:700, margin:"6px 0" }}>{item.pct}%</div>
              <div style={{ color:"#aaa", fontSize:12 }}>{item.matched} de {item.total} registros coinciden.</div>
            </div>
          ))}
          {(d.matchData||[]).filter(m => m.pct < 50).length === 0 &&
            <div style={{ color:"#10b981", padding:16 }}>✅ Todos los campos superan el 50%.</div>
          }
        </div>
      </>}

      {/* ── PROVEEDORES ── */}
      {tab==="proveedores" && data && <>
        <SectionTitle>Top 10 Proveedores por Monto Total</SectionTitle>
        <div style={{ background:"#1e1e2e", borderRadius:12, padding:20, marginBottom:20 }}>
          <ResponsiveContainer width="100%" height={280}>
            <BarChart data={d.topVendors||[]} layout="vertical" margin={{ left:10, right:30, top:0, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2a2a3e" horizontal={false} />
              <XAxis type="number" tick={{ fill:"#aaa", fontSize:11 }} tickFormatter={v=>`$${(v/1000).toFixed(1)}k`} />
              <YAxis type="category" dataKey="name" tick={{ fill:"#ccc", fontSize:11 }} width={180} />
              <Tooltip
                contentStyle={TOOLTIP_STYLE.contentStyle}
                labelStyle={TOOLTIP_STYLE.labelStyle}
                itemStyle={TOOLTIP_STYLE.itemStyle}
                formatter={v=>[fmtUSD(v),"Total"]}
              />
              <Bar dataKey="total" radius={[0,4,4,0]}>
                {(d.topVendors||[]).map((_,i) => <Cell key={i} fill={COLORS[i%COLORS.length]} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>

        <SectionTitle>Detalle por Proveedor</SectionTitle>
        <div style={{ background:"#1e1e2e", borderRadius:12, overflow:"hidden" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"#2a2a3e" }}>
                <th style={{ padding:"10px 16px", textAlign:"left",  color:"#aaa", fontWeight:500 }}>#</th>
                <th style={{ padding:"10px 16px", textAlign:"left",  color:"#aaa", fontWeight:500 }}>Proveedor</th>
                <th style={{ padding:"10px 16px", textAlign:"right", color:"#aaa", fontWeight:500 }}>Facturas</th>
                <th style={{ padding:"10px 16px", textAlign:"right", color:"#aaa", fontWeight:500 }}>Total USD</th>
                <th style={{ padding:"10px 16px", textAlign:"right", color:"#aaa", fontWeight:500 }}>Promedio</th>
              </tr>
            </thead>
            <tbody>
              {(d.topVendors||[]).map((v,i) => (
                <tr key={i} style={{ borderTop:"1px solid #2a2a3e" }}>
                  <td style={{ padding:"10px 16px", color:"#555" }}>{i+1}</td>
                  <td style={{ padding:"10px 16px", color:"#e2e8f0" }}>{v.name}</td>
                  <td style={{ padding:"10px 16px", textAlign:"right", color:"#aaa" }}>{v.count}</td>
                  <td style={{ padding:"10px 16px", textAlign:"right", color:"#22d3ee", fontWeight:600 }}>{fmtUSD(v.total)}</td>
                  <td style={{ padding:"10px 16px", textAlign:"right", color:"#888" }}>{fmtUSD(v.total / v.count)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </>}

      <Toast visible={toast.visible} msg={toast.msg} onClose={() => setToast(t => ({ ...t, visible:false }))} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
